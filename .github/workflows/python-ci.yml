name: Python CI - Test & Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-and-validate:
    name: Syntax Check, Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          # Install project requirements if present
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Syntax validation (py_compile all .py files)
        run: |
          echo "Running syntax check on all Python files..."
          find . -name "*.py" -not -path "./.git/*" | while read file; do
            python -m py_compile "$file" && echo "✅ OK: $file" || { echo "❌ FAILED: $file"; exit 1; }
          done

      - name: Lint with flake8
        run: |
          echo "Running flake8 linting..."
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (exit 0 so it doesn't fail the build)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        run: |
          echo "Running pytest (if test files exist)..."
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest --tb=short -v
          else
            echo "ℹ️  No test files found. Skipping pytest. Add test_*.py files to enable testing."
          fi
