name: Security & Code Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. SECRET SCANNING — detect hardcoded credentials/tokens
  # ──────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # 2. BANDIT — Python SAST (security anti-patterns)
  # ──────────────────────────────────────────────────────────────
  bandit:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r . \
            --exclude .git,.github \
            -f json \
            -o bandit-report.json \
            || true
          bandit -r . \
            --exclude .git,.github \
            -ll \
            --exit-zero

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ──────────────────────────────────────────────────────────────
  # 3. SAFETY — known CVEs in Python dependencies
  # ──────────────────────────────────────────────────────────────
  safety:
    name: Dependency CVE Scan (Safety)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Safety
        run: pip install safety

      - name: Scan dependencies for known CVEs
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt --full-report || true
          else
            echo "No requirements.txt found — scanning installed packages"
            safety check --full-report --continue-on-error || true
          fi

  # ──────────────────────────────────────────────────────────────
  # 4. SEMGREP — static analysis & Python security rules
  # ──────────────────────────────────────────────────────────────
  semgrep:
    name: Static Analysis (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/python
            p/secrets
            p/owasp-top-ten
            p/insecure-transport
          auditOn: push

  # ──────────────────────────────────────────────────────────────
  # 5. FLAKE8 — syntax errors & undefined names (hard fail only)
  # ──────────────────────────────────────────────────────────────
  flake8-validate:
    name: Code Validation (Flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8 — critical errors only (E9, F63, F7, F82)
        run: |
          flake8 . \
            --exclude=.git,.github \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
